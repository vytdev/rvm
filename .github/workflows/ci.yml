name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup:
      run: |
        sudo apt update
        sudo apt upgrade
        sudo apt install make gcc

    - name: Build
      run: make -Csrc B=1

    - name: Test
      run: make -Ctest

    - name: Benchmark
      run: |
        cd test
        ./h2b.py bins/fib40_slow.hex t
        ../src/rvm t
        rm t
        cd ..
